name: mineshop

volumes:
  mine_redis_data:
  mine_mysql_data:

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - mine_redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - TZ=Asia/Shanghai

  mysql:
    image: mysql:8.0
    volumes:
      - mine_mysql_data:/var/lib/mysql
    ports:
      - "3309:3306"
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mineshop
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai

  hyperf:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: mineshop-hyperf:dev
    volumes:
      - ./:/www
    working_dir: /www
    ports:
      - "9501:9501"
    environment:
      - TZ=Asia/Shanghai
      - APP_NAME=MineAdmin
      # 覆盖 Dockerfile 默认的 APP_ENV=prod，取值与项目根目录 .env 一致
      - APP_ENV=${APP_ENV:-dev}
    # 开发：热重载（改 app/config/plugins/.env 后约 2s 内自动重启，无需手动 restart）
    # 若容器内报缺少 server:watch，请在宿主机执行 composer install（勿加 --no-dev）
    command:
      - sh
      - -c
      - |
        ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        exec php bin/hyperf.php server:watch
